services:
  openclaw-meza:
    build: .
    container_name: openclaw-meza
    restart: unless-stopped

    # --- Security hardening ---
    # Rootfs stays read-only; writes go only to declared volumes/tmpfs.
    # /home/node/.openclaw is a named volume so OpenClaw can atomic-rename
    # openclaw.json for plugin/channel state persistence.
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # --- Resource limits ---
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 1.0
    pids_limit: 256

    # --- Networking ---
    # Host networking so gateway binds to host loopback directly
    # Dashboard at localhost:18790 (access via SSH tunnel or Nginx)
    network_mode: host

    # --- Writable tmpfs for temp files (noexec, nosuid) ---
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

    # --- Persistent volumes ---
    volumes:
      # Seed config: read-only at a side path; copied to the live path only
      # on first run (see command below). Direct file bind-mount doesn't
      # work because OpenClaw persists state via atomic rename, which fails
      # with EBUSY over a bind-mounted file on Linux.
      - ./openclaw.json:/etc/openclaw.json:ro
      # Named volume for the parent dir so openclaw.json itself persists
      # across container recreate (not just restart). Subdirectory volumes
      # below nest on top and win for their specific paths.
      - openclaw-meza-config:/home/node/.openclaw
      # Persistent state (credentials, WhatsApp session, agent state)
      - openclaw-meza-credentials:/home/node/.openclaw/credentials
      - openclaw-meza-state:/home/node/.openclaw/state
      - openclaw-meza-agents:/home/node/.openclaw/agents
      - openclaw-meza-canvas:/home/node/.openclaw/canvas
      - openclaw-meza-cron:/home/node/.openclaw/cron
      - openclaw-meza-devices:/home/node/.openclaw/devices
      - openclaw-meza-identity:/home/node/.openclaw/identity
      - openclaw-meza-workspace:/home/node/.openclaw/workspace

    # --- Environment ---
    env_file:
      - .env

    # --- Command: seed the live config only if it doesn't already exist
    #     (preserves runtime state across restarts), then start the gateway.
    #     The token is expanded by the in-container shell at runtime ($$),
    #     not by compose at parse time — safe for tokens containing shell
    #     metachars ($, ", `, \). ---
    command:
      - "sh"
      - "-c"
      - "[ -e /home/node/.openclaw/openclaw.json ] || cp /etc/openclaw.json /home/node/.openclaw/openclaw.json; exec openclaw gateway --port 18790 --auth password --password \"$$OPENCLAW_GATEWAY_TOKEN\""

    # --- Logging ---
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  openclaw-meza-config:
  openclaw-meza-credentials:
  openclaw-meza-state:
  openclaw-meza-agents:
  openclaw-meza-canvas:
  openclaw-meza-cron:
  openclaw-meza-devices:
  openclaw-meza-identity:
  openclaw-meza-workspace:
