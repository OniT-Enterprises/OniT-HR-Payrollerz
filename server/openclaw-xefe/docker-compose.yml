services:
  openclaw-xefe:
    build: .
    container_name: openclaw-xefe
    restart: unless-stopped

    # --- Security hardening ---
    # Rootfs stays read-only; writes go only to declared volumes/tmpfs.
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    # --- Resource limits ---
    mem_limit: 2g
    memswap_limit: 2g
    cpus: 1.0
    pids_limit: 256

    # --- Networking ---
    # Host networking so gateway binds to host loopback directly
    # Dashboard at localhost:18790 (access via SSH tunnel or Nginx)
    network_mode: host

    # --- Writable tmpfs for temp files (noexec, nosuid) ---
    tmpfs:
      - /tmp:noexec,nosuid,size=64m

    # --- Persistent volumes ---
    volumes:
      # Config (read-only bind mount)
      - ./openclaw.json:/home/node/.openclaw/openclaw.json:ro
      # Persistent state (credentials, WhatsApp session, agent state)
      - openclaw-xefe-credentials:/home/node/.openclaw/credentials
      - openclaw-xefe-state:/home/node/.openclaw/state
      - openclaw-xefe-agents:/home/node/.openclaw/agents
      - openclaw-xefe-canvas:/home/node/.openclaw/canvas
      - openclaw-xefe-cron:/home/node/.openclaw/cron
      - openclaw-xefe-devices:/home/node/.openclaw/devices
      - openclaw-xefe-identity:/home/node/.openclaw/identity
      - openclaw-xefe-workspace:/home/node/.openclaw/workspace

    # --- Environment ---
    env_file:
      - .env

    # --- Command: password auth for dashboard access ---
    command: ["openclaw", "gateway", "--port", "18790", "--auth", "password", "--password", "${OPENCLAW_GATEWAY_TOKEN}"]

    # --- Logging ---
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  openclaw-xefe-credentials:
  openclaw-xefe-state:
  openclaw-xefe-agents:
  openclaw-xefe-canvas:
  openclaw-xefe-cron:
  openclaw-xefe-devices:
  openclaw-xefe-identity:
  openclaw-xefe-workspace:
