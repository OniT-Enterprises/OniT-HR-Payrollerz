# Repeatable, human-triggered deploy for the Xefe REST API (Hetzner, PM2).
# Replaces the ad-hoc laptop rsync. The excludes are load-bearing:
# /opt/xefe-api holds the production .env and serviceAccountKey.json, which
# exist ONLY on the server — a bare --delete rsync would destroy them.
name: Deploy Xefe API (manual)

on:
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Syntax check
        run: node --check server/xefe-api/index.js

      - name: Rsync API to Hetzner
        # Pinned to a full commit SHA (v6.0.1), not a mutable branch ref — see
        # deploy.yml. Bump deliberately after reviewing upstream changes.
        uses: easingthemes/ssh-deploy@5d8aeab1a56041e269567e67a08ce00df324a617 # v6.0.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.HETZNER_HOST }}
          REMOTE_USER: ${{ secrets.HETZNER_USER }}
          SOURCE: "server/xefe-api/"
          TARGET: "/opt/xefe-api/"
          # v6 takes excludes via the dedicated EXCLUDE input (comma-separated),
          # NOT as repeated --exclude flags in ARGS (v6 stopped parsing those,
          # which broke the deploy). These excludes are load-bearing: /opt/xefe-api
          # holds the prod .env + serviceAccountKey.json, which exist ONLY on the
          # server — a bare --delete without them would destroy prod secrets.
          ARGS: "-avz --delete"
          EXCLUDE: ".env, serviceAccountKey.json, node_modules, .DS_Store"
          SCRIPT_AFTER: |
            cd /opt/xefe-api
            npm ci --omit=dev
            pm2 restart xefe-api
            sleep 3
            curl -sf http://localhost:3201/api/health
