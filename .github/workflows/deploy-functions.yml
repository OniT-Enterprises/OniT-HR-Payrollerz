# Repeatable, human-triggered deploy for Cloud Functions. Replaces the
# ad-hoc laptop `firebase deploy --only functions` (which breaks whenever the
# local CLI login expires).
#
# Auth: uses the dedicated Functions deployer account also used by deploy.yml.
# The narrower Admin SDK account is intentionally reserved for rules and cannot
# deploy Gen2 Functions/Cloud Run/Eventarc resources.
name: Deploy Cloud Functions (manual)

on:
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies (firebase-tools)
        run: npm ci

      - name: Install + build functions
        run: |
          npm ci --prefix functions
          npm --prefix functions run build

      - name: Write deployer credentials
        run: printf '%s' "$FIREBASE_DEPLOYER_JSON" > "$RUNNER_TEMP/sa.json"
        env:
          FIREBASE_DEPLOYER_JSON: ${{ secrets.FIREBASE_DEPLOYER_JSON }}

      - name: Deploy functions
        run: npx firebase deploy --only functions --project onit-hr-payroll --non-interactive --force
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
