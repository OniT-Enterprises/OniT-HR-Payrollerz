name: Deploy to Hetzner & Firebase Rules

on:
  push:
    branches: [main]

jobs:
  e2e:
    uses: ./.github/workflows/e2e.yml

  deploy:
    needs: e2e
    runs-on: ubuntu-latest
    env:
      # Some actions still declare Node 20; runners force Node 24 from
      # June 16, 2026 — opt in now so breakage surfaces before the deadline.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint --max-warnings 0

      - name: Test
        run: pnpm test

      - name: Translation coverage
        run: pnpm i18n:check

      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Firestore emulator
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      # Rules deploy automatically on push — never ship them untested
      - name: Firestore rules tests
        run: pnpm emul:rules

      - name: Build Cloud Functions
        run: npm --prefix functions run build

      - name: Build
        run: pnpm build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          # Observability + abuse protection activate the moment these secrets
          # exist — the app no-ops while they are empty (main.tsx Sentry init,
          # firebase-core ensureAppCheckInitialized).
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_RECAPTCHA_ENTERPRISE_KEY: ${{ secrets.VITE_RECAPTCHA_ENTERPRISE_KEY }}
          # Release tagging for Sentry — which deploy an error belongs to.
          VITE_COMMIT_SHA: ${{ github.sha }}

      - name: Deploy Firestore & Storage rules
        run: node scripts/deploy-rules.mjs
        env:
          FIREBASE_ADMINSDK_JSON: ${{ secrets.FIREBASE_ADMINSDK_JSON }}

      # Cloud Functions ship BEFORE the client (Hetzner) so a newly added
      # callable exists before the new frontend can call it.
      #
      # Requires a DEDICATED deployer service account in the FIREBASE_DEPLOYER_JSON
      # secret. The firebase-adminsdk SA used for rules cannot do this (see
      # scripts/deploy-rules.mjs) and functions deploy has no Admin SDK API —
      # only the CLI + Cloud Build + Artifact Registry + (for the Gen2 event
      # triggers like onShiftChange) Cloud Run + Eventarc. Roles on the SA:
      #   roles/cloudfunctions.admin
      #   roles/run.admin
      #   roles/eventarc.admin
      #   roles/artifactregistry.admin
      #   roles/cloudbuild.builds.editor
      #   roles/iam.serviceAccountUser        (to act as the runtime SA)
      #   roles/serviceusage.serviceUsageAdmin
      # firebase-tools is a devDependency, so pnpm uses the local pinned version.
      - name: Deploy Cloud Functions
        run: |
          printf '%s' "$FIREBASE_DEPLOYER_JSON" > "$RUNNER_TEMP/deployer-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/deployer-sa.json"
          pnpm exec firebase deploy --only functions --project onit-hr-payroll --non-interactive --force
        env:
          FIREBASE_DEPLOYER_JSON: ${{ secrets.FIREBASE_DEPLOYER_JSON }}

      # Indexes were the one Firestore artifact CI never deployed — the
      # emulator auto-creates them, so a query added with a new orderBy passes
      # every test and then throws FAILED_PRECONDITION only in production
      # (2026-07-22: the hiring pipeline did exactly this). This deploy only
      # CREATES missing indexes (no --force, so nothing is ever deleted); the
      # deployer SA needs roles/datastore.indexAdmin.
      - name: Deploy Firestore indexes
        run: |
          printf '%s' "$FIREBASE_DEPLOYER_JSON" > "$RUNNER_TEMP/deployer-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/deployer-sa.json"
          pnpm exec firebase deploy --only firestore:indexes --project onit-hr-payroll --non-interactive
        env:
          FIREBASE_DEPLOYER_JSON: ${{ secrets.FIREBASE_DEPLOYER_JSON }}

      - name: Deploy to Hetzner (xefe.tl)
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.HETZNER_HOST }}
          REMOTE_USER: ${{ secrets.HETZNER_USER }}
          SOURCE: "dist/spa/"
          TARGET: "/var/www/xefe.tl/dist/spa/"
          ARGS: "-avz --delete"
          SCRIPT_AFTER: |
            sudo chown -R www-data:www-data /var/www/xefe.tl/
            sudo systemctl reload nginx
