name: Deploy to Hetzner & Firebase Rules

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Some actions still declare Node 20; runners force Node 24 from
      # June 16, 2026 — opt in now so breakage surfaces before the deadline.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm ci --prefix functions

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings 150

      - name: Test
        run: npm test

      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Firestore emulator
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      # Rules deploy automatically on push — never ship them untested
      - name: Firestore rules tests
        run: npm run emul:rules

      - name: Build Cloud Functions
        run: npm --prefix functions run build

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          # Observability + abuse protection activate the moment these secrets
          # exist — the app no-ops while they are empty (main.tsx Sentry init,
          # firebase-core ensureAppCheckInitialized).
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_RECAPTCHA_ENTERPRISE_KEY: ${{ secrets.VITE_RECAPTCHA_ENTERPRISE_KEY }}

      - name: Deploy Firestore & Storage rules
        run: node scripts/deploy-rules.mjs
        env:
          FIREBASE_ADMINSDK_JSON: ${{ secrets.FIREBASE_ADMINSDK_JSON }}

      - name: Deploy to Hetzner (xefe.tl)
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.HETZNER_HOST }}
          REMOTE_USER: ${{ secrets.HETZNER_USER }}
          SOURCE: "dist/spa/"
          TARGET: "/var/www/xefe.tl/dist/spa/"
          ARGS: "-avz --delete"
          SCRIPT_AFTER: |
            sudo chown -R www-data:www-data /var/www/xefe.tl/
            sudo systemctl reload nginx
