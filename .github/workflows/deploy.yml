name: Deploy to Firebase Hosting & Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # action-hosting-deploy@v0 still declares Node 20; runners force Node 24
      # from June 16, 2026 — opt in now so breakage surfaces before the deadline
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint -- --max-warnings 150

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: onit-hr-payroll
          channelId: live

      - name: Deploy Firestore rules
        run: node scripts/deploy-rules.mjs
        env:
          FIREBASE_ADMINSDK_JSON: ${{ secrets.FIREBASE_ADMINSDK_JSON }}

      - name: Deploy to Hetzner (payroll.naroman.tl)
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.HETZNER_HOST }}
          REMOTE_USER: ${{ secrets.HETZNER_USER }}
          SOURCE: "dist/spa/"
          TARGET: "/var/www/payroll.naroman.tl/dist/spa/"
          ARGS: "-avz --delete"
          SCRIPT_AFTER: |
            sudo chown -R www-data:www-data /var/www/payroll.naroman.tl/
            sudo systemctl reload nginx
